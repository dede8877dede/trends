name: Viral Dance Check

on:
  schedule:
    - cron: '0 * * * *'   # every hour
  workflow_dispatch:        # manual trigger from GitHub UI

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Restore state
        uses: actions/cache/restore@v4
        with:
          path: |
            viral_bot/seen_videos.json
            viral_bot/video_stats.json
          key: bot-state-${{ github.run_number }}
          restore-keys: bot-state-

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install \
            python-telegram-bot==21.11.1 \
            playwright==1.51.0 \
            playwright-stealth==2.0.2
          playwright install chromium --with-deps

      - name: Run viral check
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: "8151600713"
          VIRAL_MIN_VIEWS: "500000"
          VIRAL_MIN_LIKES_RATIO: "0.02"
          MAX_AGE_HOURS: "168"
          MIN_GROWTH_VPH: "30000"
        run: python viral_bot/check.py

      - name: Save state
        if: always()
        uses: actions/cache/save@v4
        with:
          path: |
            viral_bot/seen_videos.json
            viral_bot/video_stats.json
          key: bot-state-${{ github.run_number }}
